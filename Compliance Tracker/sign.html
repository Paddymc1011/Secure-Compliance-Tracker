<!DOCTYPE html>
<html>
<head>
  <title>Solana Login with Attestto</title>
</head>
<body>

<button id="login">Login with Solana</button>

<script type="module">
// Wrap everything so the click handler is attached even if imports fail.
(async () => {
    const btn = document.getElementById("login");
    if (!btn) return;

    // Attempt to dynamically import web3 (best-effort). If it fails, keep going
    // because the Phantom wallet injected API (window.solana) is all we need here.
    try {
        await import("https://cdn.jsdelivr.net/npm/@solana/web3.js/+esm");
    } catch (e) {
        // Non-fatal. Log to console so developer can see why the static import might fail.
        console.warn("Optional @solana/web3.js import failed:", e);
    }

    btn.addEventListener("click", async () => {
        console.log("Solana login button clicked");

        // Basic environment checks
        if (!window.isSecureContext && !location.hostname.match(/^localhost(?:$|:)/)) {
            // Phantom requires a secure context (https) except on localhost.
            alert("This page must be served over HTTPS or localhost for Backpack wallet to work.");
            console.error("Insecure context:", location.href);
            return;
        }

        if (!window.solana || !window.solana.isBackpack) {
            alert("No Backpack wallet detected. Please install Backpack and allow it on this site.");
            console.error("Backpack wallet not found.");
            return;
        }

        try {
            // Request connection (popup from wallet)
            console.log("Requesting connection to Backpack wallet...");
            const resp = await window.solana.connect();
            console.log("Connected response:", resp);
            const wallet = resp?.publicKey?.toString?.() || String(resp?.publicKey || "");

            // Message to sign
            const message = "Login with Attestto on " + new Date().toISOString();
            const encoded = new TextEncoder().encode(message);

            // Sign message
            console.log("Requesting message signature...");
            const signed = await window.solana.signMessage(encoded, "utf8");
            console.log("Signed message:", signed);

            const payload = {
                wallet: wallet,
                signature: Array.from(signed?.signature || []),
                message: message
            };

            // Send to PHP backend
            console.log("Sending payload to verify.php", payload);
            const response = await fetch("verify.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const text = await response.text();
            console.log("verify.php response:", text);
            alert(text);
        } catch (err) {
            console.error("Backpack wallet login error:", err);
            alert("Error during Backpack wallet login: " + (err?.message || String(err)) + " — check console for details.");
        }
    });
})();
</script>

</body>
</html>
